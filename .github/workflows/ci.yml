name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.0.5
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting, types, and lint
        run: pnpm run check:ci

      - name: Build
        run: pnpm run build

      - name: Build test fixtures
        run: pnpm run test:fixtures

      - name: Assert fixture determinism
        run: git diff --exit-code -- test/fixtures

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: |
          pnpm dev -- --host 127.0.0.1 > vite.log 2>&1 &
          VITE_PID=$!
          trap 'kill "$VITE_PID" 2>/dev/null || true' EXIT

          for i in {1..60}; do
            if curl --silent --fail --output /dev/null http://127.0.0.1:5173/; then
              break
            fi
            sleep 1
          done

          if ! curl --silent --fail --show-error --output /dev/null http://127.0.0.1:5173/; then
            cat vite.log
            exit 1
          fi

          pnpm run test

      - name: Generate Wrangler config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_COMPATIBILITY_DATE: ${{ vars.WRANGLER_COMPATIBILITY_DATE }}
          WRANGLER_NAME: ${{ vars.WRANGLER_NAME }}
          WRANGLER_ROUTE: ${{ vars.WRANGLER_ROUTE }}
          WRANGLER_ROUTES_JSON: ${{ vars.WRANGLER_ROUTES_JSON }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret."
            exit 1
          }
          pnpm run cf:config

      - name: Deploy Cloudflare Workers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "Missing CLOUDFLARE_API_TOKEN secret."
            exit 1
          }
          pnpm run cf:deploy

      - name: Upload Vite log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vite-log
          path: vite.log
          if-no-files-found: ignore
